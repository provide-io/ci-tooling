name: 🧪 CI - Tests with Deployment Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: provide-io/ci-tooling/actions/setup-python-env@v0.0.1
        with:
          python-version: '3.11'
          install-extras: 'dev'
      - name: 🎨 Ruff Format Check
        run: |
          source workenv/bin/activate || true
          ruff format . --check
      - name: 🔍 Ruff Lint Check
        run: |
          source workenv/bin/activate || true
          ruff check .
      - name: 🏷️ MyPy Type Check
        run: |
          source workenv/bin/activate || true
          mypy src

  test:
    name: Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: provide-io/ci-tooling/actions/setup-python-env@v0.0.1
        with:
          python-version: '3.11'
          install-extras: 'dev'
      - name: 🧪 Run Tests
        run: |
          source workenv/bin/activate || true
          pytest --cov=src --cov-report=xml --cov-report=term-missing
      - name: 📊 Check Coverage
        run: |
          source workenv/bin/activate || true
          coverage report --fail-under=80

  release:
    name: Release
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: provide-io/ci-tooling/actions/setup-python-env@v0.0.1
        with:
          python-version: '3.11'
      - uses: provide-io/ci-tooling/actions/python-build@v0.0.1
      - uses: provide-io/ci-tooling/actions/python-release@v0.0.1
