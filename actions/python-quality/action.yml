name: 'Python Quality Checks'
description: 'Run code quality checks (ruff format, ruff lint, mypy)'
author: 'provide.io llc'

inputs:
  source-paths:
    description: 'Source paths to check'
    required: false
    default: 'src/ tests/'

runs:
  using: 'composite'
  steps:
    - name: 📥 Checkout ci-tooling
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        repository: provide-io/ci-tooling
        ref: main
        path: .ci-tooling

    - name: 🎨 Check formatting with Ruff
      shell: bash
      run: |
        echo "🎨 Running Ruff format check on: ${{ inputs.source-paths }}"
        .venv/bin/ruff format --check ${{ inputs.source-paths }}

    - name: 🔍 Lint with Ruff
      shell: bash
      run: |
        echo "🔍 Running Ruff lint on: ${{ inputs.source-paths }}"
        .venv/bin/ruff check ${{ inputs.source-paths }}

    - name: 🔒 Type check with MyPy
      shell: bash
      run: |
        echo "🔒 Running MyPy type check"
        .venv/bin/mypy src/ || true

branding:
  icon: 'check-circle'
  color: 'green'
