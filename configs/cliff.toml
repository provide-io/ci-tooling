#
# Default git-cliff config for the provide.io ecosystem.
# Style: terse / consumer-facing. Subject-only entries, standard Keep-a-Changelog
# groups (Features / Fixes / Security / Performance / Refactors / Tests / Docs),
# dependency-bump noise suppressed.
#
# For the richer team-facing format (repogerbil semantic groups, emoji prefixes,
# descriptions), use configs/cliff-vocabulary.toml instead.
#
# Usage:
#   git cliff --config /path/to/ci-tooling/configs/cliff.toml -o CHANGELOG.md
#   scripts/generate-changelogs.sh [<repo>...]

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first }}\
{% endfor %}
{% endfor %}\n
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
sort_commits = "oldest"

commit_parsers = [
  { message = "^[a-zA-Z]+(\\(.+\\))?!:", group = "Breaking Changes" },
  { message = "^feat|^instantiate|^scaffold|^baseline|^interface", group = "Features" },
  { message = "^fix|^remediate", group = "Fixes" },
  { message = "^harden", group = "Security" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor|^streamline|^decouple", group = "Refactors" },
  { message = "^test|^qualify", group = "Tests" },
  { message = "^docs|^specify", group = "Documentation" },
  { message = "^revert", group = "Reverts" },
  # Drop dependency-bump noise entirely — nobody reads `chore(ci): bump X from Y to Z`.
  { message = "^chore\\(ci\\): bump ", skip = true },
  { message = "^chore\\(deps\\): bump ", skip = true },
  { message = "^build\\(deps\\): bump ", skip = true },
  # Drop remaining ci / chore bookkeeping
  { message = "^ci|^chore|^build|^style", skip = true },
]

commit_preprocessors = [
  { pattern = '^\s*Co-Authored-By:.*$', replace = "" },
  { pattern = '\(cherry picked from commit [0-9a-f]{7,}\)', replace = "" },
  # Collapse runs of spaces/tabs — but NOT newlines (so split(pat="\n") | first still works).
  { pattern = '[ \t]+', replace = " " },
]

tag_pattern = "v[0-9].*|^(go|rust|py|node)/.*v[0-9].*"
