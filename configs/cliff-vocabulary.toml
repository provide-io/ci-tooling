#
# Team-facing git-cliff config. Keeps the provide.io repogerbil semantic
# vocabulary (instantiate/scaffold/harden/qualify/specify/remediate/etc.)
# as first-class category names with emoji prefixes for at-a-glance scanning.
#
# For the default consumer-facing terse changelog, use configs/cliff.toml instead.
#
# Usage:
#   git cliff --config /path/to/ci-tooling/configs/cliff-vocabulary.toml -o CHANGELOG.md
#   scripts/generate-changelogs.sh --config cliff-vocabulary.toml [<repo>...]

[changelog]
header = """
# Changelog

_Groups reflect the provide.io development vocabulary: what was **built**, **hardened**, **qualified**, **specified**, or **remediated**._

"""

body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | split(pat="\n") | first | upper_first }}\
{% endfor %}
{% endfor %}\n
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
sort_commits = "oldest"

commit_parsers = [
  { message = "^[a-zA-Z]+(\\(.+\\))?!:", group = "💥 Breaking Changes" },
  { message = "^feat|^instantiate", group = "🟢 Built (new capabilities)" },
  { message = "^scaffold|^interface", group = "🧱 Scaffolded (structure + APIs)" },
  { message = "^baseline", group = "📌 Baselined (version/state pins)" },
  { message = "^fix|^remediate", group = "🔧 Remediated (bugs + regressions)" },
  { message = "^harden", group = "🛡️ Hardened (security + resilience)" },
  { message = "^qualify|^test", group = "✅ Qualified (tests + coverage)" },
  { message = "^specify|^docs", group = "📝 Specified (docs + contracts)" },
  { message = "^streamline|^decouple|^refactor", group = "♻️ Refined (refactors + cleanups)" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^revert", group = "↩️ Reverted" },
  { message = "^ci|^build", group = "🤖 CI & Build" },
  { message = "^chore", group = "🧹 Chores" },
]

commit_preprocessors = [
  { pattern = '^\s*Co-Authored-By:.*$', replace = "" },
  { pattern = '\(cherry picked from commit [0-9a-f]{7,}\)', replace = "" },
  { pattern = '\s+', replace = " " },
]

tag_pattern = "v[0-9].*|^(go|rust|py|node)/.*v[0-9].*"
